<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defensa de la Razón Kantiana - Versión Universalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #1a2a3a;
            --accent-gold: #d4af37;
            --text-main: #2d3436;
            --bg-light: #f9f9f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            font-size: 19px; /* Legibilidad optimizada */
            line-height: 1.8;
            color: var(--text-main);
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
        }

        h1, h2, h3 { font-family: 'Montserrat', sans-serif; color: var(--primary-dark); }

        header {
            background: var(--primary-dark);
            color: var(--white);
            padding: 4rem 1rem;
            text-align: center;
            border-bottom: 6px solid var(--accent-gold);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 3rem 1.5rem; }

        .debate-section {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .menu-debates { display: flex; flex-direction: column; gap: 12px; }

        .btn-debate {
            padding: 1.2rem;
            border: none;
            background: var(--white);
            color: var(--primary-dark);
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-debate:hover, .btn-debate.active {
            background: var(--primary-dark);
            color: var(--white);
            transform: translateX(10px);
        }

        .content-debate {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            min-height: 450px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .tag {
            font-size: 0.85rem;
            padding: 6px 15px;
            border-radius: 25px;
            background: var(--accent-gold);
            color: var(--primary-dark);
            font-weight: bold;
        }

        .conclusion-box {
            background: #f8f1e5;
            border-left: 6px solid var(--accent-gold);
            padding: 1.5rem;
            margin-top: 2.5rem;
            font-style: italic;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Cátedra de Ética Deontológica</h1>
    <p>Defensa de Kant frente al espectro de teorías éticas</p>
</header>

<div class="container">
    <div class="debate-section">
        <div class="menu-debates">
            <button class="btn-debate active" onclick="mostrarDebate('universalismo', this)">
                <i class="fas fa-atlas"></i> Universalismo
            </button>
            <button class="btn-debate" onclick="mostrarDebate('utilitarismo', this)">
                <i class="fas fa-calculator"></i> Utilitarismo
            </button>
            <button class="btn-debate" onclick="mostrarDebate('egoismo', this)">
                <i class="fas fa-user-tie"></i> Egoísmo Ético
            </button>
            <button class="btn-debate" onclick="mostrarDebate('virtud', this)">
                <i class="fas fa-mask"></i> Ética de la Virtud
            </button>
            <button class="btn-debate" onclick="mostrarDebate('relativismo', this)">
                <i class="fas fa-map-marked-alt"></i> Relativismo
            </button>
        </div>

        <div class="content-debate" id="debate-display">
            </div>
    </div>
</div>

<script>
const debates = {
    universalismo: {
        titulo: "Kantianismo vs. Universalismo General",
        rival: "Sostiene que existen normas morales aplicables a todos, a menudo basadas en consensos sociales, derechos humanos o mandatos externos.",
        defensa: "Kant lleva el universalismo más allá: no se trata de seguir reglas 'porque todos las aceptan', sino porque tu propia **razón autónoma** te obliga a ellas. Mientras otros universalismos pueden ser rígidos o impuestos, el de Kant se basa en la libertad de autogobernarse bajo el Imperativo Categórico.",
        argumentoClave: "Autonomía vs. Consenso Externo",
        cita: "La ley moral no nos es impuesta; nos la damos a nosotros mismos mediante la razón."
    },
    utilitarismo: {
        titulo: "Kantianismo vs. Utilitarismo",
        rival: "El valor de una acción depende de sus resultados y la felicidad que genera.",
        defensa: "Kant rechaza la 'suerte moral' de las consecuencias. Si actúas con **buena voluntad** pero el resultado es malo por azar, tu acción sigue siendo moralmente valiosa. El utilitarismo es peligroso porque sacrifica al individuo por el grupo.",
        argumentoClave: "Dignidad Humana vs. Cálculo de Resultados",
        cita: "El hombre es un fin en sí mismo, no un medio para la felicidad de otros."
    },
    egoismo: {
        titulo: "Kantianismo vs. Egoísmo Ético",
        rival: "Actuar correctamente es actuar en beneficio propio.",
        defensa: "El egoísmo fracasa en la prueba de la **Ley Universal**. Si todos fueran egoístas, la confianza y la sociedad desaparecerían. La moralidad requiere que nuestras acciones sean coherentes para todos, sin excepciones personales.",
        argumentoClave: "Consistencia Racional vs. Interés Propio",
        cita: "Obra solo según una máxima tal que puedas querer al mismo tiempo que se torne ley universal."
    },
    virtud: {
        titulo: "Kantianismo vs. Ética de la Virtud",
        rival: "La moral depende del carácter y de las inclinaciones del individuo hacia 'el bien'.",
        defensa: "Kant argumenta que los sentimientos y el carácter son volátiles. La verdadera moralidad surge cuando actuamos **por deber**, incluso cuando nuestro carácter o inclinaciones nos dicen lo contrario. El deber es constante; el sentimiento no.",
        argumentoClave: "Deber Absoluto vs. Inclinación Natural",
        cita: "Una acción por deber tiene su valor moral no en el propósito, sino en la máxima que la determina."
    },
    relativismo: {
        titulo: "Kantianismo vs. Relativismo Cultural",
        rival: "La moral es subjetiva a cada cultura o tradición.",
        defensa: "Kant sostiene que la razón es una facultad humana universal. Si la moral fuera relativa, no existiría base para denunciar la injusticia en otros lugares. El Imperativo Categórico ofrece un estándar de justicia que trasciende fronteras.",
        argumentoClave: "Razón Universal vs. Costumbre Local",
        cita: "La justicia es necesaria y universal, no una preferencia geográfica."
    }
};

function mostrarDebate(id, btn) {
    document.querySelectorAll('.btn-debate').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const data = debates[id];
    document.getElementById('debate-display').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eee; padding-bottom:1rem; margin-bottom:2rem;">
            <h3>${data.titulo}</h3>
            <span class="tag">${data.argumentoClave}</span>
        </div>
        <p><strong>Desafío Rival:</strong> ${data.rival}</p>
        <p style="margin-top:1.5rem;"><strong>Respuesta de la Ética del Deber:</strong> ${data.defensa}</p>
        <div class="conclusion-box">
            <i class="fas fa-quote-left" style="color:var(--accent-gold); margin-right:10px;"></i>
            ${data.cita}
        </div>
    `;
}

// Inicializar
window.onload = () => mostrarDebate('universalismo', document.querySelector('.active'));
</script>

</body>
</html>
